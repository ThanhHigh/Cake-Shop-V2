services:
  cake-shop-app:
    build: .
    container_name: cake-shop-app
    command: >
          sh -c "
            mkdir -p /var/www/html/public/pages &&
            chmod -R 777 /var/www/html/public/pages &&
            mkdir -p /var/www/html/tmp &&
            chmod 777 /var/www/html/tmp &&
            mkdir -p /var/www/html/public/uploads/customers_profile_images &&
            chmod -R 777 /var/www/html/public/uploads/customers_profile_images &&
            mkdir -p /var/www/html/public/uploads &&
            chmod -R 777 /var/www/html/public/uploads &&
            mkdir -p /var/www/html/logs &&
            chmod -R 777 /var/www/html/logs &&
            apache2-foreground
          "
    ports:
      - "8085:80"
    environment:
      - DB_HOST=cake-shop-db
      - DB_PORT=3306
      - DB_USER=cake_shop
      - DB_PASSWORD=securepassword
      - DB_NAME=cake_shop_v2
      - APP_MODE=vulnerable
      - APP_DEBUG=true
      - APP_URL=http://localhost:8085
      - VULN_SQL_INJECTION=true
      - VULN_ACCESS_CONTROL=true
      - VULN_WEAK_AUTH=true
      - VULN_INSECURE_UPLOAD=true
      - VULN_MISCONFIGURATION=true
      - VULN_BROKEN_AUTH=true
      - VULN_SESSION_ISSUES=true
      - VULN_INTEGRITY_FAILURES=true
      - VULN_LOGGING_FAILURES=true
      - VULN_SSRF=true
      - VULN_REVIEW_INJECTION=true
      - VULN_OS_COMMAND_INJECTION=true
      - SSRF_ALLOWED_HOSTS=false
    volumes:
      - ./config:/var/www/html/config:ro
      - ./src:/var/www/html/src:ro
      - ./public/index.php:/var/www/html/public/index.php:ro
      - ./public/pages:/var/www/html/public/pages
      - ./public/uploads:/var/www/html/public/uploads
      - ./logs:/var/www/html/logs
      - ./tmp:/var/www/html/tmp
    depends_on:
      - cake-shop-db
    networks:
      - cake-shop-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 10m
      timeout: 5s
      retries: 5

  cake-shop-db:
    image: mysql:5.7
    container_name: cake-shop-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cake_shop_v2
      MYSQL_USER: cake_shop
      MYSQL_PASSWORD: securepassword
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - cake-shop-db-data:/var/lib/mysql
    networks:
      - cake-shop-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10m
      timeout: 5s
      retries: 5

networks:
  cake-shop-network:
    driver: bridge

volumes:
  cake-shop-db-data:
